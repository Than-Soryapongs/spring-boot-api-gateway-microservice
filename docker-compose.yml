version: '3.9'

services:

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    ports:
      - "8083:8083"

  mysql-user:
    image: mysql:8
    container_name: mysql-user
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_USER_PASSWORD}
      MYSQL_DATABASE: user_db
    ports:
      - "3307:3306"

  mysql-order:
    image: mysql:8
    container_name: mysql-order
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ORDER_PASSWORD}
      MYSQL_DATABASE: order_db
    ports:
      - "3308:3306"

  mysql-inventory:
    image: mysql:8
    container_name: mysql-inventory
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_INVENTORY_PASSWORD}
      MYSQL_DATABASE: inventory_db
    ports:
      - "3309:3306"
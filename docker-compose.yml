services:

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped

    ports:
      - "8080:8080"

    depends_on:
      user-db:
        condition: service_healthy
      inventory-db:
        condition: service_healthy
      order-db:
        condition: service_healthy

    networks:
      - microservice-network

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8081:8081"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://user-db:3306/user_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}

    depends_on:
      user-db:
        condition: service_healthy

    networks:
      - microservice-network

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://inventory-db:3306/inventory_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}

    depends_on:
      inventory-db:
        condition: service_healthy

    networks:
      - microservice-network

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8083:8083"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://order-db:3306/order_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}

    depends_on:
      order-db:
        condition: service_healthy

    networks:
      - microservice-network

  user-db:
    image: mysql:8.4
    container_name: user-db
    restart: unless-stopped
    ports:
      - "3306:3306"

    environment:
      MYSQL_DATABASE: user_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    volumes:
      - user-db-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - microservice-network

  inventory-db:
    image: mysql:8.4
    container_name: inventory-db
    restart: unless-stopped
    ports: 
      - "3307:3306"

    environment:
      MYSQL_DATABASE: inventory_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    volumes:
      - inventory-db-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservice-network

  order-db:
    image: mysql:8.4
    container_name: order-db
    restart: unless-stopped
    ports: 
      - "3308:3306"

    environment:
      MYSQL_DATABASE: order_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    volumes:
      - order-db-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservice-network

volumes:
  user-db-data:
  inventory-db-data:
  order-db-data:

networks:
  microservice-network:
    driver: bridge
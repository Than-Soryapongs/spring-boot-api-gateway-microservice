spring.application.name=inventory-service

server.port=8083

# MySQL — host is overridable so the same jar works both in Docker (container name)
# and locally (localhost), without editing the file.
spring.datasource.url=jdbc:mysql://${MYSQL_INVENTORY_HOST:localhost}:3306/inventory_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${MYSQL_INVENTORY_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool — sane defaults so a slow-starting MySQL container doesn't
# cause immediate connection failures on boot.
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Actuator — expose only health/info, not the full surface, in a service context
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
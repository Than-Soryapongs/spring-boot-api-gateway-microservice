spring.application.name=order-service

server.port=8083

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.pongs.inventory_service.model.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# URLs used to call the other microservices directly (docker-compose service names)
user-service.url=${USER_SERVICE_URL:http://user-service:8081}
inventory-service.url=${INVENTORY_SERVICE_URL:http://inventory-service:8082}
